services:
  - type: web
    name: virtualfit-kiosk
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_DEFAULT_STORE_ID
        value: store_default
      - key: FAL_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: N8N_WEBHOOK_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
